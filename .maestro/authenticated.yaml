# Puente Collect — full visual QA flow incl. authenticated tab screens.
#
# Prerequisites:
#   1. App built and running against staging backend:
#      EXPO_PUBLIC_APP_ENV=staging APP_ENV=staging yarn ios
#   2. Run once to accept Terms (clears AsyncStorage):
#      maestro test -e PARSE_USERNAME=Test -e PARSE_PASSWORD=test .maestro/accept-terms.yaml
#   3. Then run this flow:
#      maestro test -e PARSE_USERNAME=Test -e PARSE_PASSWORD=test .maestro/authenticated.yaml
#
# On subsequent runs (after Terms accepted), this flow alone is sufficient.
appId: io.ionic.starter1270348
---
# Launch WITHOUT clearing state (Terms already accepted; starting fresh would
# re-trigger the Terms modal and lose the session token).
- launchApp

# If we land on onboarding (first install), skip to Sign In.
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

- extendedWaitUntil:
    visible: "Log-In"
    timeout: 20000
- takeScreenshot: .claude/screenshots/01-sign-in

# Enter credentials via coordinate taps to target the editable TextInput
# (not the floating label). Coordinates are absolute % of 393x852 screen,
# matching field centers from the accessibility hierarchy.
#   Username field center: ~(50%, 38%)
#   Password field center: ~(50%, 48%)
#   Log-In button — tap its TOP third at ~(50%, 58%) to stay above the keyboard.
- tapOn:
    point: "50%, 38%"
- inputText: ${PARSE_USERNAME}
- tapOn:
    point: "50%, 48%"
- inputText: ${PARSE_PASSWORD}
# Scroll the form UP so the Log-In button clears the keyboard, then tap it.
- scroll
- tapOn: "Log-In"

# Dismiss the "Your Impact Dashboard" onboarding tooltip if it appears
# (shown on first login; a runFlow guard makes this safe to include always).
- runFlow:
    when:
      visible: "Your Impact Dashboard"
    commands:
      - tapOn: "Got it"
      - waitForAnimationToEnd

# Wait for the Home screen title — it renders before async stats load.
# Then let animations and network data settle before screenshotting.
- extendedWaitUntil:
    visible: "Home"
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: .claude/screenshots/04-home

# Tab bar layout (5 tabs, 393x852 screen, tabBarShowLabel: false):
#   Find Records  (tab 1): x≈10%, y≈94%
#   Data Collection(tab 2): x≈30%, y≈94%
#   Home          (tab 3): x≈50%, y≈94%
#   Assets        (tab 4): x≈70%, y≈94%
#   Settings      (tab 5): x≈90%, y≈94%
# Text-based tapOn hits accessibility labels, which may not match; coordinate
# taps on the tab bar are used for reliability.

# --- Data Collection ---
- tapOn:
    point: "30%, 94%"
- waitForAnimationToEnd
# Dismiss the "Capture Field Data" onboarding tooltip if it appears.
- runFlow:
    when:
      visible: "Capture Field Data"
    commands:
      - tapOn: "Got it"
      - waitForAnimationToEnd
- takeScreenshot: .claude/screenshots/05-data-collection

# --- Find Records ---
- tapOn:
    point: "10%, 94%"
- waitForAnimationToEnd
- takeScreenshot: .claude/screenshots/06-find-records
# Dismiss "Search All Records" tooltip before tapping next tab — the tooltip
# sits at the bottom of the screen and blocks the tab bar at y≈94%.
- runFlow:
    when:
      visible: "Search All Records"
    commands:
      - tapOn: "Got it"
      - waitForAnimationToEnd

# --- Assets ---
- tapOn:
    point: "70%, 94%"
- waitForAnimationToEnd
- takeScreenshot: .claude/screenshots/07-assets

# --- Settings ---
- tapOn:
    point: "90%, 94%"
- waitForAnimationToEnd
# Dismiss "Your Preferences" onboarding tooltip if present.
- runFlow:
    when:
      visible: "Your Preferences"
    commands:
      - tapOn: "Got it"
      - waitForAnimationToEnd
- takeScreenshot: .claude/screenshots/08-settings
