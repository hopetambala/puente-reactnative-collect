# One-time setup: logs in (accepting Terms modal) so subsequent runs have a
# valid Parse session and don't re-show Terms.
# Run once after a clearState launch.
#
# Usage:
#   maestro test -e PARSE_USERNAME=Test -e PARSE_PASSWORD=test .maestro/accept-terms.yaml
appId: io.ionic.starter1270348
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Skip"
    timeout: 60000
- tapOn: "Skip"
- extendedWaitUntil:
    visible: "Log-In"
    timeout: 20000

# Tap into the center of each input by coordinate so we land on the
# editable TextInput, not the floating label (which has the same text).
# Coordinates are % of screen; based on hierarchy with no keyboard.
#   Username field center ≈ (50%, 38%)
#   Password field center ≈ (50%, 48%)
#   Log-In button center  ≈ (50%, 60%)
# The SignIn ScrollView uses keyboardShouldPersistTaps="always", so the
# Log-In button is tappable even with the keyboard visible.
- tapOn:
    point: "50%, 38%"
- inputText: ${PARSE_USERNAME}
- tapOn:
    point: "50%, 48%"
- inputText: ${PARSE_PASSWORD}

# Debug: screenshot to confirm both fields are filled before submitting.
- takeScreenshot: .claude/screenshots/debug-before-login

- tapOn:
    point: "50%, 60%"
- waitForAnimationToEnd
- takeScreenshot: .claude/screenshots/debug-after-login

# If Terms modal appeared (login succeeded, Portal overlay shown), dismiss it.
- runFlow:
    when:
      visible: "Terms and Service"
    commands:
      - tapOn: "Terms and Service"
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - scroll
      - tapOn: "Ok"
      - waitForAnimationToEnd
      - takeScreenshot: .claude/screenshots/debug-after-terms
