name: Run Tests on PR

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create app.json for tests
        run: |
          mv app-example.json app.json

      - name: Create environment.js for tests
        run: |
          touch environment.js
          echo "const selectedEnv = {
            TEST_MODE: true,
            parseAppId: 'test-app-id',
            parseJavascriptKey: 'test-key',
            parseServerUrl: 'https://parseapi.back4app.com/',
            taskyUrlApi: 'https://puente-tasky-dev.herokuapp.com/',
            AWS_LAMBDA_URL: 'https://test-lambda-url.com',
            cloudWatchLogging: {
              logGroupName: 'puente-test-logs',
              logStreamName: 'test-log-stream',
              accessKeyId: 'test-access-key',
              secretAccessKey: 'test-secret-key',
              region: 'us-east-1'
            }
          };
          export default selectedEnv;" >> environment.js

      - name: Run linter
        run: yarn lint

      - name: Run tests
        run: yarn test-run