name: EAS Submit
on:
  workflow_run:
    workflows: ["EAS Build"]
    types:
      - completed

jobs:
  submit:
    name: Submit
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit on EAS Submit iOS
        run: EXPO_APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }} eas submit -p ios --latest --apple-id=${{ secrets.EXPO_APPLE_EMAIL_ADDRESS }} --asc-app-id=${{ secrets.EXPO_APPLE_APP_ID }}
     
      - name: Submit on EAS Submit Android
        run: eas submit -p android --latest --key="./expo-resources/android/puente-collect-432600-c8bdda85a074.json"
